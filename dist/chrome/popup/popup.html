<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkpoint</title>
  <!-- Google Fonts Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
  <script type="module" src="popup.js"></script>
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="header-logo">
        <svg class="logo-icon" viewBox="0 0 24 24" width="24" height="24">
          <path fill="url(#logo-grad)" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.53c-.26-.81-1-1.4-1.9-1.4h-1v-3c0-.55-.45-1-1-1h-6v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.4z"/>
          <defs>
            <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#818cf8" />
              <stop offset="100%" stop-color="#c084fc" />
            </linearGradient>
          </defs>
        </svg>
        <div class="header-titles">
          <h1>Checkpoint</h1>
          <p class="subtitle">Learning Memory Layer</p>
        </div>
      </div>
      <div class="active-status" id="active-status">
        <span class="status-dot"></span>
        <span class="status-text">Idle</span>
      </div>
    </header>

    <!-- Contextual Note-Taking Panel (Only shown when video is active on current tab) -->
    <section class="current-session-panel hidden" id="current-session-panel">
      <div class="section-header">
        <h2>Current Session</h2>
        <span class="active-source-badge" id="current-source">YouTube</span>
      </div>
      <div class="current-video-card">
        <div class="current-video-info">
          <p class="current-video-title" id="current-video-title">Loading video...</p>
          <span class="current-video-time" id="current-video-time">0:00 / 0:00</span>
        </div>
        
        <!-- Note Input Form -->
        <div class="note-input-container">
          <input type="text" id="note-input" placeholder="Type a note at 0:00... (Press Enter)">
          <button id="add-bookmark-btn" class="note-action-btn" title="Add Bookmark">
            <svg viewBox="0 0 24 24" width="16" height="16">
              <path fill="currentColor" d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/>
            </svg>
          </button>
          <button id="add-note-btn" title="Add Note">
            <svg viewBox="0 0 24 24" width="16" height="16">
              <path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
            </svg>
          </button>
        </div>

        <!-- Notes List for Current Video -->
        <div class="session-notes-list" id="session-notes-list">
          <!-- Dynamically populated -->
        </div>
      </div>
    </section>

    <!-- Scrollable Content Area -->
    <main class="main-content">
      
      <!-- TAB 1: RESUME -->
      <div class="tab-view active" id="view-resume">
        <div class="hero-section" id="hero-resume-container">
          <!-- Dynamically populated main hero card -->
        </div>
        <div class="recent-list-section">
          <h3>In Progress</h3>
          <div class="recent-list" id="recent-videos-list">
            <!-- Dynamic list -->
          </div>
        </div>
      </div>


      <!-- TAB 3: COURSES & PLAYLISTS -->
      <div class="tab-view" id="view-courses">
        <div class="courses-header">
          <h3>My Learning Paths</h3>
        </div>
        <div class="courses-list" id="courses-list">
          <!-- Dynamic list -->
        </div>
      </div>



      <!-- TAB 4: WORKSPACES -->
      <div class="tab-view" id="view-workspaces">
        <div class="workspace-creator">
          <h3>Capture Workspace</h3>
          <p class="description">Save your current browser window state (all open tabs) to restore it later with one click.</p>
          <div class="workspace-input-row">
            <input type="text" id="workspace-name-input" placeholder="e.g. DSA Graph Prep">
            <button class="btn btn-primary" id="btn-save-workspace">Save Tabs</button>
          </div>
        </div>
        <div class="workspaces-section">
          <h3>Saved Workspaces</h3>
          <div class="workspaces-list" id="workspaces-list">
            <!-- Dynamic workspaces -->
          </div>
        </div>
      </div>



    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="app-nav">
      <button class="nav-item active" data-tab="resume" title="Resume">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path fill="currentColor" d="M8 5v14l11-7z"/>
        </svg>
        <span>Resume</span>
      </button>

      <button class="nav-item" data-tab="courses" title="Paths">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path fill="currentColor" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v-2H7v-2h7V9H7V7h7V5h5v12h-5z"/>
        </svg>
        <span>Paths</span>
      </button>
      <button class="nav-item" data-tab="workspaces" title="Workspaces">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path fill="currentColor" d="M4 11h5V5H4v6zm0 8h5v-6H4v6zm7 0h5v-6h-5v6zm0-14v6h5V5h-5z"/>
        </svg>
        <span>Workspaces</span>
      </button>
    </nav>
  </div>
</body>
</html>
